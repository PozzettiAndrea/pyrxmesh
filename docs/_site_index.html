<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>pyrxmesh demos</title>
<style>
body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, monospace; margin: 0; padding: 0; }
.tabs { display: flex; background: #161b22; border-bottom: 1px solid #30363d; padding: 0 20px; }
.tab { padding: 12px 20px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; }
.tab:hover { color: #c9d1d9; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
iframe { width: 100%; border: none; height: calc(100vh - 50px); }
</style>
</head><body>
<div class="tabs" id="tabs">
  <div class="tab active" data-src="pyrxmesh/index.html">pyrxmesh</div>
  <div class="tab" data-src="quadwild/index.html">QuadWild Remesh</div>
  <div class="tab" data-src="penner/index.html">Penner vs QuadWild</div>
  <div class="tab" data-src="visual/index.html">Visual Compare</div>
</div>
<iframe id="content" src="pyrxmesh/index.html"></iframe>
<script>
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('content').src = tab.dataset.src;
  });
});
</script>
</body></html>
